                   2.5 2.5S13.38 11.5 12 11.5z"/>
        </svg>`;
      return L.divIcon({
        html: svg,
        className: '',
        iconSize:   [30, 42],
        iconAnchor: [15, 42],
        popupAnchor:[0, -40],
      });
    }
